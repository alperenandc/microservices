version: '3.8'

services:
  dispatcher:
    build: ./dispatcher
    container_name: dispatcher_service
    ports:
      - "8080:8080" 
    networks:
      - internal_network
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongo_dispatcher:27017/dispatcher_db
      - AUTH_SERVICE_URL=http://auth_service:3003
      - USER_SERVICE_URL=http://user_service:3001
      - PRODUCT_SERVICE_URL=http://product_service:3002
      - INTERNAL_GATEWAY_KEY=dispatcher-internal-key
    depends_on:
      - mongo_dispatcher
      - auth_service
      - prometheus

  mongo_dispatcher:
    image: mongo:latest
    container_name: mongo_dispatcher_db
    networks:
      - internal_network

  auth_service:
    build: ./auth-service
    container_name: auth_service
    expose:
      - "3003"
    networks:
      - internal_network
    depends_on:
      - mongo_auth
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://mongo_auth:27017/auth_db
      - AUTH_DEFAULT_USERNAME=admin
      - AUTH_DEFAULT_PASSWORD=admin123
      - INTERNAL_GATEWAY_KEY=dispatcher-internal-key

  mongo_auth:
    image: mongo:latest
    container_name: mongo_auth_db
    networks:
      - internal_network

  user_service:
    build: ./user-service
    container_name: user_service
    expose:
      - "3001" # ports yerine expose kullanıyoruz. Dışarıdan erişilemez, sadece iç ağdan (Dispatcher'dan) erişilebilir!
    networks:
      - internal_network
    depends_on:
      - mongo_user
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo_user:27017/user_db
      - INTERNAL_GATEWAY_KEY=dispatcher-internal-key

  mongo_user:
    image: mongo:latest
    container_name: mongo_user_db
    networks:
      - internal_network

  product_service:
    build: ./product-service
    container_name: product_service
    expose:
      - "3002" # Sadece iç ağdan erişilebilir.
    networks:
      - internal_network
    depends_on:
      - mongo_product
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongo_product:27017/product_db
      - INTERNAL_GATEWAY_KEY=dispatcher-internal-key

  mongo_product:
    image: mongo:latest
    container_name: mongo_product_db
    networks:
      - internal_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - internal_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - internal_network

  k6:
    image: grafana/k6:latest
    profiles: ["load-test"]
    container_name: k6_load_test
    volumes:
      - ./load_test.js:/scripts/load_test.js
      - ./k6-results:/results
    environment:
      - BASE_URL=http://dispatcher:8080
    command: run --out json=/results/results.json /scripts/load_test.js
    depends_on:
      - dispatcher
    networks:
      - internal_network

networks:
  internal_network:
    driver: bridge
